*{box-sizing:border-box;margin:0;padding:0}
body{background:#050505 radial-gradient(ellipse at 50% -10%,rgba(40,40,40,.5) 0,transparent 60%);color:#fff;font-family:Montserrat,sans-serif;overflow:hidden;user-select:none}
#intro,#load,#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity .5s}
#load,#auth{display:none;flex-direction:column}
.lgo{height:55px;margin-bottom:20px;filter:drop-shadow(0 0 15px rgba(255,255,255,.2))}
#intro .lgo{height:120px;animation:iA 2.5s forwards}
#auth{animation:sU .6s forwards;z-index:4}
@keyframes iA{0%{opacity:0;transform:scale(.8)}20%,80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
@keyframes sU{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
.gl{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:30px;box-shadow:0 8px 32px rgba(0,0,0,.8);width:90%;max-width:400px}
.spin{font-size:45px;animation:sp 2s linear infinite;margin-bottom:30px}
.pb-bg{background:rgba(255,255,255,.1);height:6px;border-radius:3px;margin:15px 0}
#pfill{height:100%;width:0;background:#fff;border-radius:3px;box-shadow:0 0 10px rgba(255,255,255,.5);transition:.1s}
.fl{display:flex;justify-content:space-between;align-items:center}
.err{display:none;background:rgba(255,255,255,.05);border-left:3px solid #fff;padding:10px;font-size:13px;margin-bottom:15px;font-weight:600}
.ig{margin-bottom:20px}
.ig label{font-size:11px;opacity:.5;text-transform:uppercase;font-weight:800;letter-spacing:1px}
.iw{display:flex;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.15);border-radius:12px;height:48px;padding:0 15px;margin-top:8px;transition:.3s}
.iw:focus-within{border-color:#fff;background:rgba(255,255,255,.08)}
.iw input{flex:1;background:0 0;border:none;outline:none;color:#fff;font-weight:600;font-size:15px;padding:0 12px;font-family:Montserrat,sans-serif}
.ts{display:flex;justify-content:center;gap:12px;padding:8px 0}
.tc{min-width:55px;height:55px;border-radius:12px;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s}
.tc img{width:32px;filter:grayscale(1) opacity(.5);transition:.3s}
.tc.sel{border-color:#fff;background:rgba(255,255,255,.1);box-shadow:0 0 15px rgba(255,255,255,.1)}
.tc.sel img{filter:none;transform:scale(1.15)}
button{width:100%;height:54px;border-radius:12px;background:#fff;color:#000;border:none;font-weight:800;cursor:pointer;margin-top:10px;font-family:Montserrat,sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:1.5px;transition:.3s}
button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,255,255,.2)}
.ftr{text-align:center;font-size:13px;opacity:.6;margin-top:20px;font-weight:500}
.sw{color:#fff;font-weight:800;cursor:pointer;text-decoration:underline;margin-left:5px}
i{cursor:pointer;color:rgba(255,255,255,.4)}
.iw:focus-within i{color:#fff}
</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head><body>

<div id="intro"><img id="iLogo" src="" class="lgo"></div>

<div id="load">
  <i class="fa-regular fa-futbol spin"></i>
  <div class="gl">
    <div class="fl"><span style="font-weight:600;font-size:15px" id="stxt">Загрузка...</span><span style="font-family:Orbitron;font-size:20px" id="ptxt">0<small>%</small></span></div>
    <div class="pb-bg"><div id="pfill"></div></div>
    <div style="text-align:right;font-size:13px;opacity:.5" id="tip">Синхронизация</div>
  </div>
</div>

<div id="auth"><div class="gl">
  <div style="text-align:center"><img id="aLogo" src="" class="lgo"></div>
  <div id="err" class="err"></div>
  <div class="ig"><label>Название команды</label><div class="iw"><i class="fa-solid fa-shield"></i><input id="tname" type="text" placeholder="Dream Team"></div></div>
  <div class="ig"><label>Пароль</label><div class="iw"><i class="fa-solid fa-lock"></i><input type="password" id="pwd" placeholder="••••••••"><i class="fa-regular fa-eye-slash eye"></i></div></div>
  <div class="ig" id="cg"><label>Подтверждение</label><div class="iw"><i class="fa-solid fa-lock"></i><input type="password" id="cpwd" placeholder="••••••••"><i class="fa-regular fa-eye-slash eye"></i></div></div>
  <div class="ig" id="tg"><label>Клуб</label><div class="ts">
    <div class="tc sel"><img src="https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"></div>
    <div class="tc"><img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"></div>
    <div class="tc"><img src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg"></div>
  </div></div>
  <button id="btn">СОЗДАТЬ КЛУБ</button>
  <div class="ftr"><span id="sdesc">Уже есть клуб?</span><span class="sw" id="swi">Войти</span></div>
</div></div>

<script>
iLogo.src=aLogo.src=L;
setTimeout(()=>intro.style.opacity=0,2000);
setTimeout(()=>{
  intro.style.display='none';load.style.display='flex';load.style.opacity=1;
  let p=0,c=0,s=[[0,'Загрузка...','Сервера'],[30,'Подготовка...','Синхронизация'],[70,'Почти готово!','Выход на поле...']];
  let iv=setInterval(()=>{
    p+=Math.random()*4+1;
    if(p>=100){p=100;clearInterval(iv);load.style.opacity=0;setTimeout(()=>{load.style.display='none';auth.style.display='flex'},500)}
    if(s[c+1]&&p>=s[c+1][0])c++;
    stxt.innerText=s[c][1];tip.innerText=s[c][2];pfill.style.width=p+'%';ptxt.innerHTML=~~p+'<small>%</small>';
  },100);
},2500);

let isL=0;
swi.onclick=()=>{
  isL=!isL;err.style.display='none';
  swi.innerText=isL?'Создать':'Войти';sdesc.innerText=isL?'Нет клуба?':'Уже есть клуб?';
  btn.innerText=isL?'ВОЙТИ':'СОЗДАТЬ КЛУБ';
  cg.style.display=tg.style.display=isL?'none':'block';cpwd.required=!isL;
};

document.querySelectorAll('.eye').forEach(e=>e.onclick=()=>{
  let i=e.previousElementSibling;i.type=i.type=='password'?'text':'password';
  e.classList.toggle('fa-eye');e.classList.toggle('fa-eye-slash');
});
document.querySelectorAll('.tc').forEach(c=>c.onclick=()=>{
  document.querySelector('.tc.sel').classList.remove('sel');c.classList.add('sel');
});

btn.onclick=async()=>{
  err.style.display='none';
  if(!tname.value.trim()){err.innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Введите название команды';err.style.display='block';return}
  let v=pwd.value,m='';
  if(!isL){
    if(v.length<6)m='Минимум 6 символов';
    else if(/[^a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};\':\"\|,.<>\/?№~`]/.test(v))m='Только англ. буквы и спецсимволы';
    else if(!/[a-zA-Z]/.test(v))m='Нужны англ. буквы';
    else if(!/[!@#$%^&*()_+\-=\[\]{};\':\"\|,.<>\/?№~`]/.test(v))m='Нужен спецсимвол (!@#$%^ и др.)';
    else if(v!==cpwd.value)m='Пароли не совпадают';
  }
  if(m){err.innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> '+m;err.style.display='block';return;}
  btn.disabled=true; btn.innerText='...';
  const name=tname.value.trim(), pass=pwd.value;
  const clubIdx=[...document.querySelectorAll('.tc')].findIndex(c=>c.classList.contains('sel'));
  if(isL){
    // LOGIN
    const {data,error}=await db.from('profiles').select('*').eq('username',name).eq('password',pass).single();
    if(error||!data){err.innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Неверное имя или пароль';err.style.display='block';btn.disabled=false;btn.innerText='ВОЙТИ';return;}
    setSession({id:data.id,username:data.username,club:data.club||0,coins:data.coins});
    window.location.href='menu.html';
  } else {
    // REGISTER
    const {data:ex}=await db.from('profiles').select('id').eq('username',name).maybeSingle();
    if(ex){err.innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Имя уже занято';err.style.display='block';btn.disabled=false;btn.innerText='СОЗДАТЬ КЛУБ';return;}
    const {data,error}=await db.from('profiles').insert({username:name,password:pass,coins:(name.toLowerCase()==='nikita'?20000000:10000),club:clubIdx}).select().single();
    if(error){err.innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Ошибка сервера';err.style.display='block';btn.disabled=false;btn.innerText='СОЗДАТЬ КЛУБ';return;}
    setSession({id:data.id,username:data.username,club:clubIdx,coins:data.coins});
    window.location.href='menu.html';
  }
};
</script></body></html>
