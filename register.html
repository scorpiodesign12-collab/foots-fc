<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FOOTS FC | REGISTRATION</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* === БАЗОВЫЕ СТИЛИ === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
    width:100%;height:100%;overflow:hidden;
    background:#050505;font-family:'Montserrat',sans-serif;color:#fff;
    -webkit-font-smoothing:antialiased;user-select:none;
}

/* === СТРОГИЙ ТЕМНЫЙ ФОН === */
.dark-bg {
    position:fixed;inset:0;
    background:radial-gradient(ellipse at 50% -10%, rgba(40,40,40,0.5) 0%, transparent 60%), linear-gradient(175deg, #050505 0%, #111111 50%, #000000 100%);
    z-index:-1;
}

/* === ЭКРАНЫ === */
#intro-screen {
    position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
}
.intro-logo {
    width: min(350px, 80vw);
    animation: introAnim 2.5s ease forwards;
}

#loading-screen {
    position: fixed; inset: 0; z-index: 500; display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
}

#auth-screen {
    display: none; position: fixed; inset: 0; z-index: 400; flex-direction: column; align-items: center; justify-content: center;
    animation: slideUpFade 0.6s ease forwards;
}

/* === АНИМАЦИИ === */
@keyframes introAnim {
    0%  {opacity: 0; transform: scale(0.85)}
    20% {opacity: 1; transform: scale(1.02)}
    80% {opacity: 1; transform: scale(1)}
    100%{opacity: 0; transform: scale(1.08)}
}
@keyframes slideUpFade {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes spin { 100% { transform: rotate(360deg); } }

/* === ЭФФЕКТ СТЕКЛА (ЧБ СТИЛЬ) === */
.glass-panel {
    width: 100%; background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px;
    padding: 26px 34px; position: relative;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 255, 255, 0.02);
}

/* === ЗАГРУЗКА === */
.loading-icon-wrapper {
    width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3);
    display: flex; justify-content: center; align-items: center; margin-bottom: 40px;
}
.loading-icon-wrapper i { font-size: 45px; color: #ffffff; animation: spin 2s linear infinite; }

.progress-container { width: 85%; max-width: 400px; margin-bottom: 30px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-weight: 600; font-size: 15px; }
.progress-percent { font-family:'Orbitron', sans-serif; font-size: 24px; }
.progress-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; position: relative; }
.progress-bar-fill { height: 100%; width: 0%; background: #ffffff; border-radius: 3px; transition: width 0.1s linear; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
.loading-tip { width: 85%; max-width: 400px; display: flex; align-items: center; gap: 16px; font-size: 13px; color: rgba(255, 255, 255, 0.5); }
.loading-tip i { font-size: 20px; color: #ffffff; }

/* === ФОРМА АВТОРИЗАЦИИ === */
.auth-wrapper { max-width: 460px; width: 90%; }
.auth-header { display: flex; justify-content: center; align-items: center; margin-bottom: 24px; }
.auth-header img { height: 42px; }

.reg-title { font-family: 'Orbitron', sans-serif; font-size: 24px; text-align: center; letter-spacing: 2px; margin-bottom: 24px; }

/* Ошибки */
.error-message {
    display: none; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #ffffff;
    padding: 12px 16px; border-radius: 4px; font-size: 13px; font-weight: 600; margin-bottom: 20px;
}
.error-message i { margin-right: 8px; }

/* Инпуты */
.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 700; color: rgba(255, 255, 255, 0.5); margin-bottom: 8px; letter-spacing: 1px; }
.input-wrapper {
    display: flex; align-items: center; background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; height: 52px; padding: 0 16px; transition: all 0.3s ease;
}
.input-wrapper:focus-within { border-color: #ffffff; background: rgba(255, 255, 255, 0.08); }
.input-icon { color: rgba(255, 255, 255, 0.4); font-size: 16px; width: 24px; text-align: center; }
.input-wrapper input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 600; padding: 0 12px; }
.toggle-password { color: rgba(255, 255, 255, 0.4); cursor: pointer; font-size: 16px; transition: color 0.3s ease; }
.toggle-password:hover { color: #ffffff; }

/* Команды */
.team-selection-group { margin-top: 15px; margin-bottom: 28px; }
.teams-slider { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.teams-slider::-webkit-scrollbar { display: none; }
.team-card {
    flex: 0 0 auto; width: 60px; height: 60px; border-radius: 10px; background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease;
}
.team-card img { width: 36px; height: 36px; object-fit: contain; filter: grayscale(100%) opacity(0.5); transition: all 0.3s ease; }
.team-card.selected { border-color: #ffffff; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
.team-card.selected img { filter: grayscale(0%) opacity(1); transform: scale(1.15); }

/* Кнопка */
.submit-btn {
    width: 100%; height: 54px; border-radius: 10px; background: #ffffff; border: none; color: #000000;
    font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
    cursor: pointer; display: flex; justify-content: center; align-items: center; margin-top: 10px; transition: transform 0.3s ease;
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2); }
.submit-btn:active { transform: translateY(1px); }

/* Переключатель Вход/Регистрация (внизу) */
.auth-footer {
    margin-top: 22px; text-align: center; font-size: 13px; color: rgba(255, 255, 255, 0.5);
}
.auth-switch {
    color: #ffffff; font-weight: 700; cursor: pointer; text-decoration: underline;
    margin-left: 6px; transition: color 0.3s ease;
}
.auth-switch:hover { color: #aaaaaa; }

@media (max-width: 400px) {
    .glass-panel { padding: 20px 20px; }
    .reg-title { font-size: 20px; }
}
</style>
</head>

                        <div class="team-card" data-team="man_city"><img src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg" alt="Man City"></div>
                        <div class="team-card" data-team="psg"><img src="https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg" alt="PSG"></div>
                        <div class="team-card" data-team="bayern"><img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg" alt="Bayern"></div>
                        <div class="team-card" data-team="shakhtar"><img src="https://upload.wikimedia.org/wikipedia/en/a/a1/FC_Shakhtar_Donetsk.svg" alt="Shakhtar Donetsk"></div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const introScreen = document.getElementById("intro-screen");
        const loadingScreen = document.getElementById("loading-screen");
        const authScreen = document.getElementById("auth-screen");

        // Интро -> Загрузка
        setTimeout(() => {
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.display = 'none';
                loadingScreen.style.display = 'flex';
                loadingScreen.offsetHeight;
                loadingScreen.style.opacity = '1';
                startLoading();
            }, 500); 
        }, 2500); 

        // Загрузка
        function startLoading() {
            let progress = 0;
            const progressFill = document.getElementById("progress-fill");
            const progressText = document.getElementById("progress-text");
            const statusText = document.getElementById("stxt");
            const tipText = document.getElementById("tip");

            const stages =[
                {at: 0,  msg: 'Подключаемся к серверам...', tip: 'Работает на выделенных серверах.'},
                {at: 20, msg: 'Проверяем данные...', tip: 'Статистика карьеры синхронизируется.'},
                {at: 40, msg: 'Загрузка профиля...', tip: 'Готовим вашу команду к игре.'},
                {at: 60, msg: 'Готовим стадион...', tip: 'Трибуны реагируют на каждый гол.'},
                {at: 80, msg: 'Выходим на поле...', tip: 'Живая погода влияет на игру.'},
                {at: 96, msg: 'К бою готовы!', tip: 'Вперёд. Поле уже ждёт тебя.'}
            ];
            let currentStage = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 4 + 1; 
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // Загрузка -> Авторизация
                    setTimeout(() => {
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                            authScreen.style.display = 'flex';
                        }, 500);
                    }, 400);
                }

                for (let i = currentStage; i < stages.length; i++) {
                    if (progress >= stages[i].at) {
                        if (i !== currentStage) {
                            statusText.textContent = stages[i].msg;
                            tipText.textContent = stages[i].tip;
                            currentStage = i;
                        }
                    }
                }

                requestAnimationFrame(() => {
                    progressFill.style.width = progress + "%";
                    progressText.innerHTML = Math.floor(progress) + "<small>%</small>";
                });
            }, 100);
        }

        // Переключение Вход / Регистрация
        let isLogin = false;
        const authSwitch = document.getElementById("auth-switch");
        const formTitle = document.getElementById("form-title");
        const confirmPasswordGroup = document.getElementById("confirm-password-group");
        const confirmPassInput = document.getElementById("confirm-pass-input");
        const teamSelectionGroup = document.getElementById("team-selection-group");
        const submitBtnText = document.getElementById("submit-btn-text");
        const passError = document.getElementById("password-error");

        authSwitch.addEventListener("click", () => {
            isLogin = !isLogin;
            passError.style.display = 'none'; 
            
            if (isLogin) {
                authSwitch.innerText = "Создать";
                document.getElementById("auth-switch-desc").innerText = "Еще нет клуба?";
                formTitle.innerText = "ВХОД";
                confirmPasswordGroup.style.display = "none";
                confirmPassInput.removeAttribute("required");
                teamSelectionGroup.style.display = "none";
                submitBtnText.innerText = "ВОЙТИ";
            } else {
                authSwitch.innerText = "Войти";
                document.getElementById("auth-switch-desc").innerText = "Уже есть клуб?";
                formTitle.innerText = "РЕГИСТРАЦИЯ";
                confirmPasswordGroup.style.display = "block";
                confirmPassInput.setAttribute("required", "true");
                teamSelectionGroup.style.display = "block";
                submitBtnText.innerText = "СОЗДАТЬ КЛУБ";
            }
        });

        // Глазок пароля
        document.querySelectorAll(".toggle-password").forEach(icon => {
            icon.addEventListener("click", function() {
                const input = this.previousElementSibling;
                if (input.type === "password") {
                    input.type = "text";
                    this.classList.replace("fa-eye-slash", "fa-eye");
                } else {
                    input.type = "password";
                    this.classList.replace("fa-eye", "fa-eye-slash");
                }
            });
        });

        // Выбор команды
        const teamCards = document.querySelectorAll(".team-card");
        const selectedTeamInput = document.getElementById("selected-team");
        teamCards.forEach(card => {
            card.addEventListener("click", () => {
                teamCards.forEach(c => c.classList.remove("selected"));
                card.classList.add("selected");
                selectedTeamInput.value = card.dataset.team;
            });
        });

        // Валидация формы
        const authForm = document.getElementById("auth-form");
        const passInput = document.getElementById("pass-input");

        function showError(msg) {
            passError.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
            passError.style.display = 'block';
        }

        authForm.addEventListener("submit", (e) => {
            e.preventDefault();
            passError.style.display = 'none';
            passError.innerHTML = '';

            if (!isLogin) {
                const passVal = passInput.value;
                const confVal = confirmPassInput.value;

                if (passVal.length < 6) {
                    return showError('Пароль должен содержать минимум 6 символов.');
                }
                if (!/[a-zA-Z]/.test(passVal)) {
                    return showError('Пароль должен обязательно содержать английские буквы.');
                }
                if (/[А-Яа-яЁё]/.test(passVal)) {
                    return showError('Русские буквы в пароле запрещены.');
                }
                if (!/[№$!]/.test(passVal)) {
                    return showError('Пароль должен содержать хотя бы один из символов: №, $, !');
                }
                if (passVal !== confVal) {
                    return showError('Пароли не совпадают!');
                }

                alert('Регистрация прошла успешно! Добро пожаловать.');
            } else {
                alert('Вход выполнен!');
            }
        });
    });
</script>
</body>
</html>
